name: BF Website CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - name: Enforce .git size budget
        run: |
          CURRENT_SIZE=$(du -sm .git | cut -f1)

          if [ "$CURRENT_SIZE" -gt 120 ]; then
            echo "FAIL: repo too large"
            exit 1
          fi
      - run: npm run repo:guard
      - run: npm run check
      - run: npm run generate:sitemap
      - run: npm test
      - run: npm run build
