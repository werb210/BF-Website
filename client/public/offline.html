<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Boreal Financial</title>
    <style>
      body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
             font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #0B1F3A; color: #fff; }
      .card { max-width: 380px; padding: 32px 24px; text-align: center; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.5; opacity: 0.85; margin: 0 0 24px; }
      button { background: #fff; color: #0B1F3A; border: 0; border-radius: 6px;
               padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Boreal Financial needs an internet connection to load. Check your signal and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
